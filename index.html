<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 40px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; }
        .input-group { margin: 10px 0; text-align: left; }
        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; margin-top: 15px; width: 100%; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Diabetes Predictor</h1>
        <p>Enter patient vitals below:</p>

        <div class="input-group"><label>Pregnancies:</label><input type="number" id="f1" value="1"></div>
        <div class="input-group"><label>Glucose:</label><input type="number" id="f2" value="120"></div>
        <div class="input-group"><label>Blood Pressure:</label><input type="number" id="f3" value="70"></div>
        <div class="input-group"><label>Skin Thickness:</label><input type="number" id="f4" value="20"></div>
        <div class="input-group"><label>Insulin:</label><input type="number" id="f5" value="80"></div>
        <div class="input-group"><label>BMI:</label><input type="number" id="f6" value="32.0"></div>
        <div class="input-group"><label>Diabetes Pedigree Function:</label><input type="number" id="f7" value="0.5"></div>
        <div class="input-group"><label>Age:</label><input type="number" id="f8" value="33"></div>

        <button onclick="makePrediction()">Predict</button>

        <div id="result">Waiting for input...</div>
    </div>

    <script>
        async function makePrediction() {
            const resultDiv = document.getElementById("result");
            resultDiv.innerText = "Analyzing...";
            resultDiv.style.color = "#333";

            try {
                // 1. Load the ONNX model
                const session = await ort.InferenceSession.create('./diabetes_model.onnx');

                // 2. Grab the 8 inputs from the user
                const inputs = [
                    parseFloat(document.getElementById('f1').value),
                    parseFloat(document.getElementById('f2').value),
                    parseFloat(document.getElementById('f3').value),
                    parseFloat(document.getElementById('f4').value),
                    parseFloat(document.getElementById('f5').value),
                    parseFloat(document.getElementById('f6').value),
                    parseFloat(document.getElementById('f7').value),
                    parseFloat(document.getElementById('f8').value)
                ];

                // 3. Format them into an ONNX Tensor of shape [1, 8]
                const inputData = new Float32Array(inputs);
                const tensor = new ort.Tensor('float32', inputData, [1, 8]);

                // 4. Feed the data to the model
                const feeds = { input1: tensor };
                const results = await session.run(feeds);

                // 5. Read the output! (Returns an array with 2 probabilities)
                const output = results.output1.data;
                const probNoDiabetes = output[0];
                const probDiabetes = output[1];

                if (probDiabetes > probNoDiabetes) {
                    resultDiv.innerText = `Prediction: Diabetes Detected\n(Confidence: ${(probDiabetes * 100).toFixed(1)}%)`;
                    resultDiv.style.color = "red";
                } else {
                    resultDiv.innerText = `Prediction: No Diabetes\n(Confidence: ${(probNoDiabetes * 100).toFixed(1)}%)`;
                    resultDiv.style.color = "green";
                }

            } catch (e) {
                console.error(e);
                resultDiv.innerText = "Error running model! Check console.";
                resultDiv.style.color = "orange";
            }
        }
    </script>
</body>
</html>
